<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Employee Management</title>
    <meta name="description" content="Admin login for Employee Management System" />
    <!-- Bootstrap 5 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
    <div class="bg-animated"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <!-- Logo -->
            <div class="login-logo">
                <div class="login-logo-icon">🏢</div>
                <div class="login-logo-text">
                    EmpManage
                    <span>Admin Portal</span>
                </div>
            </div>

            <!-- Heading -->
            <h1 class="login-title">Welcome back 👋</h1>
            <p class="login-subtitle">Sign in to access the admin dashboard</p>

            <!-- Alert -->
            <div class="alert alert-error" id="loginAlert"></div>

            <!-- Form -->
            <form id="loginForm" onsubmit="handleLogin(event)" novalidate>
                <div class="mb-3">
                    <label class="form-label" for="email">Email Address</label>
                    <input
                        id="email"
                        type="email"
                        class="form-control"
                        placeholder="admin@company.com"
                        autocomplete="email"
                        required
                    />
                </div>

                <div class="mb-4">
                    <label class="form-label" for="password">Password</label>
                    <input
                        id="password"
                        type="password"
                        class="form-control"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    />
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">
                    Sign In →
                </button>
            </form>

            <!-- Footer note -->
            <p style="text-align:center;margin-top:24px;font-size:12px;color:var(--text-faint)">
                Admin access only · Secure JWT session
            </p>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmBG54eMR9JVZQb3OxJGAXbzPhe" crossorigin="anonymous"></script>
    <script>
        requireGuest();

        async function handleLogin(e) {
            e.preventDefault();
            const alert = document.getElementById('loginAlert');
            alert.classList.remove('show');

            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('loginBtn');

            if (!email || !password) {
                alert.textContent = 'Please enter your email and password';
                alert.classList.add('show');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Signing in…';

            try {
                await login(email, password);
                window.location.href = '/employees.html';
            } catch (err) {
                alert.textContent = err.message || 'Invalid credentials';
                alert.classList.add('show');
                btn.disabled = false;
                btn.textContent = 'Sign In →';
            }
        }
    </script>
</body>
</html>
